# 音乐播放器配置。
# 当前使用 Meting API 拉取网易云抖音排行榜，自动更新热门音乐。
# 如需改回本地音乐：把 mode 改为 'local'，并把音频文件放到 static/music/ 下。

mode = 'meting'
volume = 0.7
playMode = 'list'
autoplay = true
randomOnLoad = true

[meting]
api = 'https://api.i-meto.com/meting/api?server=:server&type=:type&id=:id&r=:r'
server = 'netease'
type = 'playlist'
id = '10520166' # 网易云音乐抖音排行榜
fallbackApis = [
  'https://api.injahow.cn/meting/?server=:server&type=:type&id=:id',
  'https://api.moeyao.cn/meting/?server=:server&type=:type&id=:id'
]

[local]
dir = 'music'
coverDir = 'music/cover'
lrcDir = 'music/lrc'
