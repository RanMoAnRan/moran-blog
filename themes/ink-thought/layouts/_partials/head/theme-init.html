<script>
	  (function () {
	    var storageKey = "ink-theme";
	    var root = document.documentElement;
	    var lightThemeColor = "#f1f5f9";
	    var darkThemeColor = "#0b1020";

	    function getSystemTheme() {
	      if (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) {
	        return "dark";
	      }
	      return "light";
	    }

	    function normalizeTheme(value) {
	      return value === "dark" || value === "light" ? value : getSystemTheme();
	    }

	    function syncThemeColor(theme) {
	      var meta = document.querySelector('meta[name="theme-color"]');
	      if (!meta) {
	        meta = document.createElement("meta");
	        meta.setAttribute("name", "theme-color");
	        document.head.appendChild(meta);
	      }
	      meta.setAttribute("content", theme === "dark" ? darkThemeColor : lightThemeColor);
	    }

	    try {
	      var stored = localStorage.getItem(storageKey);
	      var theme = normalizeTheme(stored);
	      root.setAttribute("data-theme", theme);
	      root.style.colorScheme = theme;
	      syncThemeColor(theme);
	    } catch (e) {
	      root.setAttribute("data-theme", "light");
	      root.style.colorScheme = "light";
	      syncThemeColor("light");
	    }
	  })();
</script>
<style>
  html {
    background-color: #f1f5f9;
  }

  html[data-theme="dark"] {
    background-color: #0b1020;
  }
</style>
