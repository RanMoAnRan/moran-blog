<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">OpenClaw 从聊天机器人走向执行层</title>
  <desc id="desc">对比聊天机器人与个人执行层的差异，强调状态、工具、权限与持续任务。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7fafc"/>
      <stop offset="100%" stop-color="#edf2f7"/>
    </linearGradient>
    <linearGradient id="leftCard" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <linearGradient id="rightCard" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eefaf6"/>
      <stop offset="100%" stop-color="#dff4eb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <style>
      .title { font: 700 38px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; fill: #0f172a; }
      .subtitle { font: 500 18px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; fill: #475569; }
      .card-title { font: 700 28px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; fill: #0f172a; }
      .label { font: 700 18px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; fill: #1e293b; }
      .value { font: 500 17px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; fill: #334155; }
      .small { font: 600 15px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; fill: #64748b; letter-spacing: 1px; }
      .pill { font: 700 14px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; }
    </style>
  </defs>

  <rect width="1200" height="720" fill="url(#bg)"/>
  <circle cx="1010" cy="130" r="120" fill="#dbeafe" opacity="0.7"/>
  <circle cx="160" cy="620" r="140" fill="#e2e8f0" opacity="0.8"/>

  <text x="84" y="86" class="title">OpenClaw 代表的变化，不是更会聊天，而是更像执行层</text>
  <text x="84" y="120" class="subtitle">当个人 AI 进入真实工作流，核心问题会从“答得好不好”转向“能不能持续、可靠、有限度地做事”。</text>

  <g filter="url(#shadow)">
    <rect x="70" y="168" width="450" height="470" rx="28" fill="url(#leftCard)"/>
    <rect x="680" y="168" width="450" height="470" rx="28" fill="url(#rightCard)"/>
  </g>

  <rect x="104" y="198" width="118" height="34" rx="17" fill="#dbeafe"/>
  <text x="126" y="220" class="pill" fill="#1d4ed8">旧范式</text>
  <text x="104" y="270" class="card-title">聊天机器人</text>
  <text x="104" y="304" class="subtitle">一次会话，一次回答，价值集中在“懂不懂你”。</text>

  <rect x="714" y="198" width="118" height="34" rx="17" fill="#bbf7d0"/>
  <text x="736" y="220" class="pill" fill="#15803d">新范式</text>
  <text x="714" y="270" class="card-title">个人执行层</text>
  <text x="714" y="304" class="subtitle">持续驻留、连接工具、管理状态、带边界地执行任务。</text>

  <g>
    <text x="104" y="364" class="label">交互单位</text>
    <text x="104" y="392" class="value">问一句，答一句</text>
    <line x1="104" y1="416" x2="484" y2="416" stroke="#e2e8f0"/>
    <text x="104" y="458" class="label">上下文</text>
    <text x="104" y="486" class="value">依赖当前窗口，容易断</text>
    <line x1="104" y1="510" x2="484" y2="510" stroke="#e2e8f0"/>
    <text x="104" y="552" class="label">动作能力</text>
    <text x="104" y="580" class="value">偏建议，偏生成，弱执行</text>
  </g>

  <g>
    <text x="714" y="364" class="label">交互单位</text>
    <text x="714" y="392" class="value">任务流，而不是单轮对话</text>
    <line x1="714" y1="416" x2="1094" y2="416" stroke="#bfdbd1"/>
    <text x="714" y="458" class="label">上下文</text>
    <text x="714" y="486" class="value">跨设备、跨工具、持续保留状态</text>
    <line x1="714" y1="510" x2="1094" y2="510" stroke="#bfdbd1"/>
    <text x="714" y="552" class="label">动作能力</text>
    <text x="714" y="580" class="value">能执行，但必须带权限边界</text>
  </g>

  <g>
    <rect x="540" y="250" width="120" height="48" rx="24" fill="#0f172a"/>
    <text x="565" y="280" class="pill" fill="#ffffff">重心迁移</text>
    <line x1="520" y1="328" x2="680" y2="328" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
    <polygon points="680,328 660,316 660,340" fill="#94a3b8"/>
  </g>

  <g>
    <rect x="528" y="392" width="144" height="54" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="558" y="424" class="label">状态</text>
    <rect x="528" y="462" width="144" height="54" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="558" y="494" class="label">工具</text>
    <rect x="528" y="532" width="144" height="54" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="558" y="564" class="label">权限</text>
  </g>

  <text x="84" y="680" class="small">OpenClaw 值得关注的，是它把个人 AI 从“会聊天的窗口”往“带边界的执行系统”推进。</text>
</svg>
