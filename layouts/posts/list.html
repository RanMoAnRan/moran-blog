{{ define "main" }}
  <div class="container posts-container">
    <div class="content posts-page">
      <header class="page-header posts-compact-header">
        <div class="posts-compact-header__main">
          <a
            class="posts-back-btn"
            href="{{ "/" | relURL }}"
            onclick="if (window.history.length > 1) { window.history.back(); return false; }"
          >
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m15 18-6-6 6-6"/></svg>
            返回
          </a>
          <div>
            <h1 class="page-title">{{ .Title }}</h1>
            {{ with .Description }}<p class="page-desc">{{ . }}</p>{{ end }}
            {{ with .Content }}<div class="prose">{{ . }}</div>{{ end }}
          </div>
        </div>
        <p class="page-meta"><strong>{{ len .Pages }}</strong><span>篇文章</span></p>
      </header>

      {{ $paginator := .Paginate .Pages }}
      <div class="post-list">
        {{ range $paginator.Pages }}
          {{ partial "post-card.html" . }}
        {{ end }}
      </div>

      {{ partial "pagination.html" . }}
    </div>
  </div>
{{ end }}
