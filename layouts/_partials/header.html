<header class="site-header" role="banner">
  <div class="header-layout-wrapper" style="height: 100%;">
    <div class="header-inner">
      <!-- Brand (Left) -->
      <a class="brand" href="{{ site.Home.RelPermalink }}">
        <span class="brand-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
        </span>
        {{ site.Params.profile.name | default site.Title }}
      </a>

      <!-- Center: Nav -->
      <nav class="nav-desktop" aria-label="主导航">
        <a href="{{ site.Home.RelPermalink }}" class="nav-link {{ if .IsHome }}is-active{{ end }}">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          首页
        </a>
        <a href="{{ "archives" | relURL }}" class="nav-link {{ if or (eq .Section "archives") (hasPrefix .RelPermalink ("archives" | relURL)) }}is-active{{ end }}">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          归档
        </a>
        <a href="{{ "tags" | relURL }}" class="nav-link {{ if or (eq .Section "tags") (eq .Section "categories") }}is-active{{ end }}">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"/></svg>
          分类/标签
        </a>
        <a href="{{ "sites" | relURL }}" class="nav-link {{ if or (eq .Section "sites") (hasPrefix .RelPermalink ("sites" | relURL)) }}is-active{{ end }}">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l-6 3V6l6-3 6 3 6-3v15l-6 3-6-3z"/><path d="M9 3v15"/><path d="M15 6v15"/></svg>
          导航
        </a>
        <a href="{{ "subscribe" | relURL }}" class="nav-link {{ if or (eq .Section "subscribe") (hasPrefix .RelPermalink ("subscribe" | relURL)) }}is-active{{ end }}">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 11a9 9 0 0 1 9 9"/><path d="M4 4a16 16 0 0 1 16 16"/><circle cx="5" cy="19" r="1"/></svg>
          订阅
        </a>
        <div class="nav-dropdown {{ if or (eq .Section "about") (eq .Section "friends") (hasPrefix .RelPermalink ("about" | relURL)) (hasPrefix .RelPermalink ("friends" | relURL)) }}is-active{{ end }}">
          <button class="nav-link nav-dropdown__trigger {{ if or (eq .Section "about") (eq .Section "friends") (hasPrefix .RelPermalink ("about" | relURL)) (hasPrefix .RelPermalink ("friends" | relURL)) }}is-active{{ end }}" type="button" aria-haspopup="true">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            关于
            <svg class="nav-dropdown__chevron" xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m6 9 6 6 6-6"/></svg>
          </button>
          <div class="nav-dropdown__menu" role="menu" aria-label="关于菜单">
            <a href="{{ "about" | relURL }}" class="nav-dropdown__item {{ if or (eq .Section "about") (hasPrefix .RelPermalink ("about" | relURL)) }}is-active{{ end }}" role="menuitem">
              <span>关于我</span>
              <small>Profile</small>
            </a>
            <a href="{{ "friends" | relURL }}" class="nav-dropdown__item {{ if or (eq .Section "friends") (hasPrefix .RelPermalink ("friends" | relURL)) }}is-active{{ end }}" role="menuitem">
              <span>友链</span>
              <small>Friends</small>
            </a>
          </div>
        </div>
        <a href="{{ "stats" | relURL }}" class="nav-link {{ if or (eq .Section "stats") (hasPrefix .RelPermalink ("stats" | relURL)) }}is-active{{ end }}">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M7 14l3-3 3 2 5-6"/></svg>
          统计
        </a>
      </nav>

      <!-- Right Side: actions -->
      <div class="header-actions">
        <!-- On mobile, nav toggle is the primary navigation affordance; put it first for visual + focus order. -->
        <button
          class="icon-button nav-toggle"
          type="button"
          data-nav-toggle
          aria-label="菜单"
          aria-expanded="false"
          aria-controls="nav-mobile"
        >
          <svg class="nav-toggle-icon nav-toggle-open" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>
          <svg class="nav-toggle-icon nav-toggle-close" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        </button>

        <form class="header-search" action="{{ "search" | relURL }}" method="get" role="search">
          <label class="sr-only" for="header-search-input">搜索</label>
          <input
            id="header-search-input"
            class="header-search-input"
            type="search"
            name="q"
            inputmode="search"
            autocomplete="off"
            spellcheck="false"
            placeholder="搜索…"
          >
          <button class="icon-button header-search-button" type="submit" aria-label="搜索">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
          </button>
        </form>

        <button class="icon-button theme-toggle" type="button" data-theme-toggle aria-label="切换主题" title="切换主题">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
        </button>


        <button class="icon-button header-music-toggle" type="button" data-header-music-toggle aria-label="音乐" aria-expanded="false" aria-controls="header-music-panel" title="音乐">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
        </button>

        <button class="icon-button header-hue-toggle" type="button" data-hue-toggle aria-label="主题色相" aria-expanded="false" aria-controls="header-hue-panel" title="主题色相">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="13.5" cy="6.5" r=".5" fill="currentColor"/><circle cx="17.5" cy="10.5" r=".5" fill="currentColor"/><circle cx="8.5" cy="7.5" r=".5" fill="currentColor"/><circle cx="6.5" cy="12.5" r=".5" fill="currentColor"/><path d="M12 2C6.5 2 2 5.58 2 10c0 3.31 2.69 6 6 6h1.5a2.5 2.5 0 0 1 2.5 2.5A3.5 3.5 0 0 0 15.5 22H16c3.31 0 6-4.03 6-9 0-6.08-4.48-11-10-11Z"/></svg>
        </button>

        <a
          class="icon-button header-social"
          href="https://github.com/RanMoAnRan"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="GitHub：RanMoAnRan"
          title="GitHub"
        >
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>
        </a>

        <a
          class="icon-button header-social"
          href="mailto:{{ site.Params.profile.email | default "ranmoanran@gmail.com" }}"
          aria-label="Email"
          title="Email"
        >
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
        </a>
      </div>
    </div>
  </div>

  <div class="header-floating-panel header-music-panel" id="header-music-panel" data-header-music-panel hidden>
    {{ partial "home-music-widget.html" (dict "Page" . "id" "header-music-widget" "class" "home-music-widget--floating") }}
  </div>

  <div class="header-floating-panel header-hue-panel" id="header-hue-panel" data-hue-panel hidden>
    <div class="hue-panel__title">主题色相</div>
    <input class="hue-panel__range" type="range" min="0" max="359" step="1" data-hue-range aria-label="主题色相">
    <div class="hue-panel__swatches" aria-label="快速颜色">
      <button type="button" data-hue-preset="0" style="--swatch-hue:0" aria-label="红色"></button>
      <button type="button" data-hue-preset="35" style="--swatch-hue:35" aria-label="橙色"></button>
      <button type="button" data-hue-preset="95" style="--swatch-hue:95" aria-label="绿色"></button>
      <button type="button" data-hue-preset="180" style="--swatch-hue:180" aria-label="青色"></button>
      <button type="button" data-hue-preset="220" style="--swatch-hue:220" aria-label="蓝色"></button>
      <button type="button" data-hue-preset="262" style="--swatch-hue:262" aria-label="紫色"></button>
      <button type="button" data-hue-preset="320" style="--swatch-hue:320" aria-label="粉色"></button>
    </div>
    <button class="hue-panel__reset" type="button" data-hue-reset>恢复默认</button>
  </div>

  <div class="nav-mobile" id="nav-mobile" data-nav-mobile hidden>
    <div class="container">
      <nav class="nav-mobile-menu" aria-label="主导航">
        <a href="{{ site.Home.RelPermalink }}" class="nav-mobile-link {{ if .IsHome }}is-active{{ end }}">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          首页
        </a>
        <a href="{{ "archives" | relURL }}" class="nav-mobile-link {{ if or (eq .Section "archives") (hasPrefix .RelPermalink ("archives" | relURL)) }}is-active{{ end }}">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          归档
        </a>
        <a href="{{ "tags" | relURL }}" class="nav-mobile-link {{ if or (eq .Section "tags") (eq .Section "categories") }}is-active{{ end }}">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"/></svg>
          分类/标签
        </a>
        <a href="{{ "sites" | relURL }}" class="nav-mobile-link {{ if or (eq .Section "sites") (hasPrefix .RelPermalink ("sites" | relURL)) }}is-active{{ end }}">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l-6 3V6l6-3 6 3 6-3v15l-6 3-6-3z"/><path d="M9 3v15"/><path d="M15 6v15"/></svg>
          导航
        </a>
        <a href="{{ "subscribe" | relURL }}" class="nav-mobile-link {{ if or (eq .Section "subscribe") (hasPrefix .RelPermalink ("subscribe" | relURL)) }}is-active{{ end }}">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 11a9 9 0 0 1 9 9"/><path d="M4 4a16 16 0 0 1 16 16"/><circle cx="5" cy="19" r="1"/></svg>
          订阅
        </a>
        <a href="{{ "about" | relURL }}" class="nav-mobile-link {{ if or (eq .Section "about") (hasPrefix .RelPermalink ("about" | relURL)) }}is-active{{ end }}">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          关于
        </a>
        <a href="{{ "friends" | relURL }}" class="nav-mobile-link nav-mobile-link--sub {{ if or (eq .Section "friends") (hasPrefix .RelPermalink ("friends" | relURL)) }}is-active{{ end }}">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          友链
        </a>
        <a href="{{ "stats" | relURL }}" class="nav-mobile-link {{ if or (eq .Section "stats") (hasPrefix .RelPermalink ("stats" | relURL)) }}is-active{{ end }}">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M7 14l3-3 3 2 5-6"/></svg>
          统计
        </a>
        <a class="nav-mobile-link nav-mobile-github" href="https://github.com/RanMoAnRan" target="_blank" rel="noopener noreferrer">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>
          GitHub
        </a>
      </nav>
    </div>
  </div>
</header>
