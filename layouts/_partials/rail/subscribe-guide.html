{{- $feeds := site.Data.subscriptions.feeds | default (slice) -}}
<section class="rail-card rail-subscribe-guide" aria-label="订阅说明">
  <div class="rail-card__head">
    <p class="rail-eyebrow">Reading feeds</p>
    <span>{{ len $feeds }}</span>
  </div>
  <div class="rail-category-stack">
    {{- range first 6 $feeds -}}
      <a href="{{ .site | default .url }}" target="_blank" rel="noopener noreferrer"><span>{{ .name }}</span><em>↗</em></a>
    {{- end -}}
  </div>
</section>
